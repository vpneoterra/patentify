<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPCo — IP Whitespace Strategy Platform</title>
<meta name="description" content="IPCo IP Whitespace Strategy — Interactive Dashboard, Investor Pitch, Patent Lab & AI Command Center">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --font-display: 'DM Serif Display', serif;
  --font-body: 'DM Sans', sans-serif;
  --bg: #000000;
  --bg-bar: #050505;
  --border: rgba(148,163,184,0.10);
  --text: #F1F5F9;
  --text-muted: #94A3B8;
  --text-faint: #64748B;
  --accent: #2E8B7A;
  --accent-blue: #2563EB;
  --accent-amber: #D4A017;
  --accent-violet: #8B5CF6;
  --accent-rose: #F43F5E;
  --glow: rgba(46,139,122,0.15);
  --surface: #0A0A0A;
}

html, body { height: 100%; overflow: hidden; font-family: var(--font-body); background: var(--bg); color: var(--text); }

/* ─── TOP BAR ─── */
.topbar {
  height: 52px;
  background: var(--bg-bar);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  position: relative;
  z-index: 1000;
  flex-shrink: 0;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--text);
}

.logo svg { width: 28px; height: 28px; flex-shrink: 0; }
.logo-text { font-family: var(--font-display); font-size: 17px; letter-spacing: -0.02em; }
.logo-divider { width: 1px; height: 24px; background: var(--border); }

/* ─── VIEW TOGGLE (4-way) ─── */
.view-toggle {
  display: flex;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 3px;
  position: relative;
  gap: 0;
}

.view-btn {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 14px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border-radius: 24px;
  transition: color 0.3s ease;
  white-space: nowrap;
  letter-spacing: 0.01em;
}

.view-btn svg {
  width: 14px;
  height: 14px;
  opacity: 0.7;
  transition: opacity 0.3s ease;
}

.view-btn.active {
  color: var(--text);
}
.view-btn.active svg {
  opacity: 1;
}

.view-btn:hover:not(.active) {
  color: var(--text);
}

/* Sliding pill behind active button */
.toggle-pill {
  position: absolute;
  top: 3px;
  left: 3px;
  height: calc(100% - 6px);
  border-radius: 24px;
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), width 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
  pointer-events: none;
}

/* Pill color variants per view */
.toggle-pill[data-view="dashboard"] {
  background: linear-gradient(135deg, rgba(46,139,122,0.2) 0%, rgba(37,99,235,0.15) 100%);
  border: 1px solid rgba(46,139,122,0.25);
  box-shadow: 0 0 12px rgba(46,139,122,0.15), inset 0 1px 0 rgba(255,255,255,0.04);
}
.toggle-pill[data-view="investor"] {
  background: linear-gradient(135deg, rgba(37,99,235,0.2) 0%, rgba(139,92,246,0.15) 100%);
  border: 1px solid rgba(37,99,235,0.25);
  box-shadow: 0 0 12px rgba(37,99,235,0.15), inset 0 1px 0 rgba(255,255,255,0.04);
}
.toggle-pill[data-view="patent-lab"] {
  background: linear-gradient(135deg, rgba(212,160,23,0.2) 0%, rgba(234,179,8,0.15) 100%);
  border: 1px solid rgba(212,160,23,0.25);
  box-shadow: 0 0 12px rgba(212,160,23,0.15), inset 0 1px 0 rgba(255,255,255,0.04);
}
.toggle-pill[data-view="admin"] {
  background: linear-gradient(135deg, rgba(139,92,246,0.2) 0%, rgba(244,63,94,0.12) 100%);
  border: 1px solid rgba(139,92,246,0.25);
  box-shadow: 0 0 12px rgba(139,92,246,0.15), inset 0 1px 0 rgba(255,255,255,0.04);
}

/* ─── MODE INDICATOR DOTS ─── */
.topbar-right {
  display: flex;
  align-items: center;
  gap: 14px;
}

.mode-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 500;
}

.mode-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  transition: background 0.4s ease, box-shadow 0.4s ease;
}
.mode-dot.dashboard {
  background: var(--accent);
  box-shadow: 0 0 8px rgba(46,139,122,0.4);
}
.mode-dot.investor {
  background: var(--accent-blue);
  box-shadow: 0 0 8px rgba(37,99,235,0.4);
}
.mode-dot.patent-lab {
  background: var(--accent-amber);
  box-shadow: 0 0 8px rgba(212,160,23,0.4);
}
.mode-dot.admin {
  background: var(--accent-violet);
  box-shadow: 0 0 8px rgba(139,92,246,0.4);
}


/* ─── FRAME CONTAINER ─── */
.frame-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.frame-container iframe {
  width: 100%;
  height: 100%;
  border: none;
  position: absolute;
  top: 0;
  left: 0;
}

iframe.hidden {
  opacity: 0;
  pointer-events: none;
  z-index: 0;
}

iframe.visible {
  opacity: 1;
  pointer-events: auto;
  z-index: 1;
  transition: opacity 0.35s ease;
}

/* App layout */
.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ─── KEYBOARD HINT ─── */
.kbd-hint {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-faint);
}
.kbd {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 20px;
  height: 20px;
  padding: 0 5px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 10px;
  font-family: var(--font-body);
  color: var(--text-muted);
  font-weight: 600;
}

/* ─── IDEA COUNT BADGE ─── */
.idea-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  background: rgba(212,160,23,0.15);
  border: 1px solid rgba(212,160,23,0.3);
  border-radius: 9px;
  font-size: 10px;
  font-weight: 700;
  color: var(--accent-amber);
  letter-spacing: 0;
}

/* ─── AI PULSE BADGE ─── */
.ai-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 0 7px;
  height: 18px;
  background: rgba(139,92,246,0.12);
  border: 1px solid rgba(139,92,246,0.25);
  border-radius: 9px;
  font-size: 9px;
  font-weight: 700;
  color: var(--accent-violet);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.ai-badge .pulse {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent-violet);
  animation: ai-pulse 2s ease-in-out infinite;
}
@keyframes ai-pulse {
  0%, 100% { opacity: 0.4; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* Mobile */
@media (max-width: 768px) {
  .topbar { padding: 0 10px; height: 48px; }
  .logo-text { font-size: 15px; }
  .logo-divider { display: none; }
  .view-btn { padding: 5px 8px; font-size: 11px; gap: 4px; }
  .view-btn span.label-text { display: none; }
  .kbd-hint { display: none; }
  .mode-badge { display: none; }
  .idea-count { display: none; }
  .ai-badge span.ai-label { display: none; }
}

/* ─── PASSWORD GATE ─── */
.gate-overlay {
  position: fixed;
  inset: 0;
  z-index: 99999;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;

}
.gate-overlay.dismissed {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.gate-card {
  width: 380px;
  max-width: 90vw;
  background: #0A0A0A;
  border: 1px solid rgba(148,163,184,0.12);
  border-radius: 16px;
  padding: 48px 36px 40px;
  text-align: center;

}
.gate-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 28px;
}
.gate-logo svg { width: 36px; height: 36px; color: #2E8B7A; }
.gate-logo-text { font-family: 'DM Serif Display', serif; font-size: 24px; color: #F1F5F9; letter-spacing: -0.02em; }
.gate-subtitle {
  font-size: 13px;
  color: #64748B;
  margin-bottom: 32px;
  line-height: 1.5;
}
.gate-input-wrap {
  position: relative;
  margin-bottom: 16px;
}
.gate-input {
  width: 100%;
  height: 48px;
  background: #111;
  border: 1px solid rgba(148,163,184,0.15);
  border-radius: 10px;
  padding: 0 48px 0 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: #F1F5F9;
  outline: none;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.gate-input::placeholder { color: #475569; }
.gate-input:focus {
  border-color: rgba(46,139,122,0.5);
  box-shadow: 0 0 0 3px rgba(46,139,122,0.1);
}
.gate-input.shake {
  animation: gateShake 0.5s ease;
  border-color: #EF4444;
}
@keyframes gateShake {
  0%, 100% { transform: translateX(0); }
  15%, 45%, 75% { transform: translateX(-6px); }
  30%, 60%, 90% { transform: translateX(6px); }
}
.gate-eye {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #475569;
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  transition: color 0.2s;
}
.gate-eye:hover { color: #94A3B8; }
.gate-btn {
  width: 100%;
  height: 46px;
  background: linear-gradient(135deg, #2E8B7A, #236b5f);
  border: none;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: transform 0.15s, box-shadow 0.25s, opacity 0.2s;
}
.gate-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(46,139,122,0.3);
}
.gate-btn:active { transform: translateY(0); }
.gate-error {
  font-size: 12px;
  color: #EF4444;
  margin-top: 12px;
  min-height: 18px;
  transition: opacity 0.2s;
}
.gate-footer {
  margin-top: 28px;
  font-size: 11px;
  color: #334155;
  line-height: 1.5;
}
.app.locked {
  display: none !important;
}
</style>
</head>

<script>
(function() {
  var KEY = [97,105,109,97,107,101,115,105,112]; // encoded
  var gate = document.getElementById('gateOverlay');
  var app = document.getElementById('mainApp');
  var inp = document.getElementById('gateInput');
  var btn = document.getElementById('gateBtn');
  var err = document.getElementById('gateError');
  var eye = document.getElementById('gateEye');

  // Check session
  if (sessionStorage.getItem('ipco_auth') === 'granted') {
    gate.classList.add('dismissed');
    app.classList.remove('locked');
  } else {
    inp.focus();
  }

  function verify() {
    var val = inp.value.trim();
    var match = val.length === KEY.length && val.split('').every(function(c, i) { return c.charCodeAt(0) === KEY[i]; });
    if (match) {
      sessionStorage.setItem('ipco_auth', 'granted');
      gate.classList.add('dismissed');
      app.classList.remove('locked');
      err.textContent = '';
    } else {
      err.textContent = 'Invalid access code. Please try again.';
      inp.classList.add('shake');
      setTimeout(function() { inp.classList.remove('shake'); }, 500);
      inp.value = '';
      inp.focus();
    }
  }

  btn.addEventListener('click', verify);
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); verify(); }
    err.textContent = '';
  });

  // Toggle password visibility
  var visible = false;
  eye.addEventListener('click', function() {
    visible = !visible;
    inp.type = visible ? 'text' : 'password';
    eye.innerHTML = visible
      ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
      : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  });
})();
</script>

    admin: document.getElementById('frameAdmin')
  };
  const pill = document.getElementById('togglePill');
  const modeDot = document.getElementById('modeDot');
  const modeLabel = document.getElementById('modeLabel');
  
  const viewOrder = ['investor', 'dashboard', 'patent-lab', 'admin'];
  const viewLabels = { dashboard: 'Strategy', investor: 'Business Plan', 'patent-lab': 'Patent Lab', admin: 'Command Center' };
  let current = 'investor';

  function measurePill() {
    const active = buttons[current];
    const parent = document.getElementById('viewToggle');
    const pRect = parent.getBoundingClientRect();
    const aRect = active.getBoundingClientRect();
    pill.style.width = aRect.width + 'px';
    pill.style.transform = 'translateX(' + (aRect.left - pRect.left - 3) + 'px)';
    pill.setAttribute('data-view', current);
  }

  function switchView(view) {
    if (view === current) return;
    current = view;

    Object.keys(buttons).forEach(function(key) {
      buttons[key].classList.toggle('active', key === view);
      buttons[key].setAttribute('aria-pressed', key === view);
    });

    Object.keys(frames).forEach(function(key) {
      frames[key].className = key === view ? 'visible' : 'hidden';
    });

    modeDot.className = 'mode-dot ' + view;
    modeLabel.textContent = viewLabels[view];

    // Notify chat widget of view change
    if (window.IPCoChat) {
      window.IPCoChat.setView(view);
    }

    // When switching to investor, force-reveal all scroll-animated sections
    if (view === 'investor') {
      setTimeout(function() {
        try {
          frames.investor.contentWindow.postMessage('reveal-all', '*');
        } catch(e) { /* cross-origin safety */ }
      }, 100);
      setTimeout(function() {
        try {
          frames.investor.contentWindow.postMessage('reveal-all', '*');
          var iw = frames.investor.contentWindow;
          iw.scrollBy(0, 1);
          iw.scrollBy(0, -1);
        } catch(e) {}
      }, 400);
    }

    measurePill();
  }

  Object.keys(buttons).forEach(function(key) {
    buttons[key].addEventListener('click', function() { switchView(key); });
  });

  // Keyboard shortcut: Tab key cycles through views
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Tab' && !e.target.closest('input, textarea, select')) {
      e.preventDefault();
      var idx = viewOrder.indexOf(current);
      var next = viewOrder[(idx + 1) % viewOrder.length];
      switchView(next);
    }
  });

  // Initialize pill position after fonts load
  requestAnimationFrame(function() {
    measurePill();
    setTimeout(measurePill, 100);
    setTimeout(measurePill, 300);
  });

  window.addEventListener('resize', measurePill);

  // Investor is default — trigger reveal-all once iframe loads
  frames.investor.addEventListener('load', function() {
    setTimeout(function() {
      try {
        frames.investor.contentWindow.postMessage('reveal-all', '*');
      } catch(e) {}
    }, 500);
    setTimeout(function() {
      try {
        frames.investor.contentWindow.postMessage('reveal-all', '*');
      } catch(e) {}
    }, 1500);
  });
})();
</script>
</body>
</html>
